<!DOCTYPE html>
<!--
  [站点注释 Site Note]
  文件: D:\Documents\GitHub\whwdzg.github.io\media\video.html
  作用: 页面结构与内容容器，具体交互由对应 JS/CSS 增强。
  English: Defines page markup; behavior and styling are enhanced by JS/CSS.
-->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b101b">
    <meta name="color-scheme" content="light dark">
    <meta http-equiv="x-dns-prefetch-control" content="on">
    <title>媒体 - 视频</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/resource/img/shell/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
    <link rel="preload" href="/css/media-player.css" as="style">
    <link rel="preload" href="/resource/font/FluentSystemIcons-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="modulepreload" href="/js/media/common.js">
    <link rel="modulepreload" href="/js/media/video.js">
    <link rel="stylesheet" href="/css/component.css">
    <link rel="stylesheet" href="/css/media-player.css">
    <link rel="stylesheet" href="/resource/font/FluentSystemIcons-Regular.css">
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-danmuku/dist/artplayer-plugin-danmuku.js" defer></script>
    <script src="/js/pwa/register-sw.js" defer></script>
</head>
<body class="media-page video-page">
    <div class="dynamic-bg" aria-hidden="true"></div>

    <header class="top-nav">
        <a class="back-link" href="/">返回主站</a>
    </header>

    <main class="content-area">
        <section class="video-stage" id="video-stage">
            <video id="main-media" playsinline></video>
            <div class="danmaku-layer" id="danmaku-layer"></div>
            <div class="subtitle-layer hidden" id="subtitle-layer" aria-live="polite"></div>
        </section>
    </main>

    <section class="player-dock">
        <div class="progress-zone">
            <input id="seek-range" class="progress-input component-slider" type="range" min="0" max="0" step="0.01" value="0">
            <div id="progress-preview" class="progress-preview">
                <img id="preview-image" src="" alt="预览图" decoding="async">
                <div class="time-line">
                    <span id="preview-time">00:00</span>
                    <span id="preview-total">00:00</span>
                </div>
            </div>
        </div>

        <div class="player-row">
            <div class="info-left">
                <img id="cover-image" alt="封面" decoding="async">
                <div class="track-meta">
                    <div id="track-title" class="track-title">未导入视频</div>
                    <div id="track-author" class="track-author">作者：-</div>
                    <div id="track-album" class="track-album hidden"></div>
                    <div class="track-time"><span id="running-time">00:00</span> / <span id="total-time">00:00</span></div>
                </div>
            </div>

            <div class="controls-mid">
                <button class="control-btn icon-only" id="prev-btn" type="button" title="上一项" aria-label="上一项">
                    <i class="fluent-icon icon-ic_fluent_previous_24_regular" aria-hidden="true"></i>
                </button>
                <button class="control-btn icon-only" id="back10-btn" type="button" title="快退 10 秒" aria-label="快退 10 秒">
                    <i class="fluent-icon icon-ic_fluent_rewind_24_regular" aria-hidden="true"></i>
                </button>
                <button class="control-btn primary icon-only" id="play-btn" type="button" title="播放/暂停" aria-label="播放">
                    <i id="play-icon" class="fluent-icon icon-ic_fluent_play_24_regular" aria-hidden="true"></i>
                </button>
                <button class="control-btn icon-only" id="fwd10-btn" type="button" title="快进 10 秒" aria-label="快进 10 秒">
                    <i class="fluent-icon icon-ic_fluent_fast_forward_24_regular" aria-hidden="true"></i>
                </button>
                <button class="control-btn icon-only" id="next-btn" type="button" title="下一项" aria-label="下一项">
                    <i class="fluent-icon icon-ic_fluent_next_24_regular" aria-hidden="true"></i>
                </button>
            </div>

            <div class="controls-right">
                <button class="control-btn icon-only" id="import-btn" type="button" title="导入" aria-label="导入">
                    <i class="fluent-icon icon-ic_fluent_cloud_arrow_up_24_regular" aria-hidden="true"></i>
                </button>
                <button class="control-btn icon-only" id="settings-btn" type="button" title="设置" aria-label="设置">
                    <i class="fluent-icon icon-ic_fluent_settings_24_regular" aria-hidden="true"></i>
                </button>
                <button class="control-btn icon-only" id="volume-btn" type="button" title="音量" aria-label="音量">
                    <i class="fluent-icon icon-ic_fluent_speaker_2_24_regular" aria-hidden="true"></i>
                </button>
                <button class="control-btn icon-only" id="playlist-btn" type="button" title="播放列表" aria-label="播放列表">
                    <i class="fluent-icon icon-ic_fluent_apps_list_24_regular" aria-hidden="true"></i>
                </button>
                <button class="control-btn icon-only" id="fullscreen-btn" type="button" title="全屏视频" aria-label="全屏视频">
                    <i class="fluent-icon icon-ic_fluent_full_screen_maximize_24_regular" aria-hidden="true"></i>
                </button>
                <button class="control-btn icon-only" id="danmaku-btn" type="button" aria-pressed="false" title="弹幕" aria-label="弹幕">
                    <i class="fluent-icon icon-ic_fluent_chat_24_regular" aria-hidden="true"></i>
                </button>
                <button class="control-btn icon-only" id="danmaku-settings-btn" type="button" title="弹幕设置" aria-label="弹幕设置">
                    <i class="fluent-icon icon-ic_fluent_chat_settings_24_regular" aria-hidden="true"></i>
                </button>
            </div>
        </div>

        <div id="import-panel" class="floating-panel" aria-label="导入方式面板">
            <div class="setting-row setting-row-title">选择导入方式</div>
            <div class="floating-panel-divider" aria-hidden="true"></div>
            <div class="import-panel-actions">
                <button id="import-folder-btn" class="panel-action-btn component-btn component-btn--flat" type="button">
                    <i class="fluent-icon icon-ic_fluent_folder_open_24_regular" aria-hidden="true"></i>
                    <span>导入文件夹（推荐）</span>
                </button>
                <button id="import-file-btn" class="panel-action-btn component-btn component-btn--flat" type="button">
                    <i class="fluent-icon icon-ic_fluent_document_24_regular" aria-hidden="true"></i>
                    <span>导入视频文件</span>
                </button>
            </div>
        </div>

        <div id="danmaku-settings-panel" class="floating-panel" aria-label="弹幕设置面板">
            <div class="setting-row setting-row-title">弹幕设置</div>
            <div class="setting-row">
                <label for="danmaku-size">大小</label>
                <div class="setting-control">
                    <input id="danmaku-size" class="component-slider component-range-slider" type="range" min="14" max="42" step="1" value="24">
                    <input class="setting-value-input component-dialog__input" id="danmaku-size-value" type="text" value="24">
                </div>
            </div>
            <div class="setting-row">
                <label for="danmaku-weight">粗细</label>
                <div class="setting-control">
                    <input id="danmaku-weight" class="component-slider component-range-slider" type="range" min="400" max="900" step="100" value="700">
                    <input class="setting-value-input component-dialog__input" id="danmaku-weight-value" type="text" value="700">
                </div>
            </div>
            <div class="setting-row">
                <label for="block-scroll-danmaku">屏蔽滚动弹幕</label>
                <label class="component-switch" aria-label="屏蔽滚动弹幕开关">
                    <input id="block-scroll-danmaku" class="component-switch__input" type="checkbox">
                    <span class="component-switch__track"><span class="component-switch__thumb"></span></span>
                </label>
            </div>
            <div class="setting-row">
                <label for="block-top-danmaku">屏蔽上方弹幕</label>
                <label class="component-switch" aria-label="屏蔽上方弹幕开关">
                    <input id="block-top-danmaku" class="component-switch__input" type="checkbox">
                    <span class="component-switch__track"><span class="component-switch__thumb"></span></span>
                </label>
            </div>
            <div class="setting-row">
                <label for="danmaku-layout">排布模式</label>
                <div class="component-dropdown" id="danmaku-layout-dropdown">
                    <button class="component-dropdown-toggle" type="button" aria-expanded="false" aria-haspopup="listbox" aria-controls="danmaku-layout-list">
                        <span id="danmaku-layout-label" class="toggle-label">全部</span>
                        <i class="toggle-icon fluent-icon icon-ic_fluent_chevron_down_24_regular" aria-hidden="true"></i>
                    </button>
                    <div class="component-dropdown-list" id="danmaku-layout-list" role="listbox" aria-label="弹幕排布模式">
                        <div class="component-dropdown-item selected" role="option" aria-selected="true" data-value="all">全部</div>
                        <div class="component-dropdown-item" role="option" aria-selected="false" data-value="no-overlap">不重叠</div>
                    </div>
                    <select id="danmaku-layout" class="hidden component-dialog__input" tabindex="-1" aria-hidden="true">
                        <option value="all" selected>全部</option>
                        <option value="no-overlap">不重叠</option>
                    </select>
                </div>
            </div>
            <div class="setting-row">
                <label for="danmaku-speed">速度</label>
                <div class="setting-control">
                    <input id="danmaku-speed" class="component-slider component-range-slider" type="range" min="0.5" max="2" step="0.1" value="0.8">
                    <input class="setting-value-input component-dialog__input" id="danmaku-speed-value" type="text" value="0.8x">
                </div>
            </div>
            <div class="setting-row">
                <label for="danmaku-opacity">透明度</label>
                <div class="setting-control">
                    <input id="danmaku-opacity" class="component-slider component-range-slider" type="range" min="0.2" max="1" step="0.05" value="0.9">
                    <input class="setting-value-input component-dialog__input" id="danmaku-opacity-value" type="text" value="90%">
                </div>
            </div>
        </div>

        <div id="settings-panel" class="floating-panel" aria-label="设置面板">
            <div class="setting-row setting-row-title">设置</div>
            <div class="floating-panel-divider" aria-hidden="true"></div>
            <div class="setting-row">
                <label for="speed-range">倍速</label>
                <div class="setting-control">
                    <input id="speed-range" class="component-slider component-range-slider" type="range" min="0.5" max="2" step="0.05" value="1">
                    <input class="setting-value-input component-dialog__input" id="speed-value" type="text" value="1.00x">
                </div>
            </div>
            <div class="setting-row">
                <label for="brightness-range">亮度</label>
                <div class="setting-control">
                    <input id="brightness-range" class="component-slider component-range-slider" type="range" min="0.4" max="1.6" step="0.01" value="1">
                    <input class="setting-value-input component-dialog__input" id="brightness-value" type="text" value="100%">
                </div>
            </div>
            <div class="setting-row">
                <label for="toggle-dynamic-bg">动态背景</label>
                <label class="component-switch" aria-label="动态背景开关">
                    <input id="toggle-dynamic-bg" class="component-switch__input" type="checkbox" checked>
                    <span class="component-switch__track"><span class="component-switch__thumb"></span></span>
                </label>
            </div>
            <div class="setting-row">
                <label for="toggle-subtitle">开启字幕</label>
                <label class="component-switch" aria-label="开启字幕开关">
                    <input id="toggle-subtitle" class="component-switch__input" type="checkbox" checked>
                    <span class="component-switch__track"><span class="component-switch__thumb"></span></span>
                </label>
            </div>
            <div class="setting-row">
                <label for="subtitle-opacity">字幕透明度</label>
                <div class="setting-control">
                    <input id="subtitle-opacity" class="component-slider component-range-slider" type="range" min="0.2" max="1" step="0.05" value="1">
                    <input class="setting-value-input component-dialog__input" id="subtitle-opacity-value" type="text" value="100%">
                </div>
            </div>
        </div>

        <div id="volume-panel" class="floating-panel" aria-label="音量面板">
            <div class="setting-row setting-row-title">音效</div>
            <div class="floating-panel-divider" aria-hidden="true"></div>
            <div class="setting-row">
                <label for="volume-range">音量</label>
                <div class="setting-control">
                    <input id="volume-range" class="component-slider component-range-slider" type="range" min="0" max="1" step="0.01" value="1">
                    <input class="setting-value-input component-dialog__input" id="volume-value" type="text" value="100%">
                </div>
            </div>
            <div class="setting-row">
                <label for="eq-low">低频</label>
                <div class="setting-control">
                    <input id="eq-low" class="component-slider component-range-slider" type="range" min="-12" max="12" value="0">
                    <input class="setting-value-input component-dialog__input" id="eq-low-value" type="text" value="0 dB">
                </div>
            </div>
            <div class="setting-row">
                <label for="eq-mid">中频</label>
                <div class="setting-control">
                    <input id="eq-mid" class="component-slider component-range-slider" type="range" min="-12" max="12" value="0">
                    <input class="setting-value-input component-dialog__input" id="eq-mid-value" type="text" value="0 dB">
                </div>
            </div>
            <div class="setting-row">
                <label for="eq-high">高频</label>
                <div class="setting-control">
                    <input id="eq-high" class="component-slider component-range-slider" type="range" min="-12" max="12" value="0">
                    <input class="setting-value-input component-dialog__input" id="eq-high-value" type="text" value="0 dB">
                </div>
            </div>
        </div>

        <input id="import-file-input" class="hidden" type="file" multiple accept="video/*,.mp4,.mkv,.webm,.mov,.avi,.xml,.ass,.ssa,.srt,.vtt">
        <input id="import-folder-input" class="hidden" type="file" multiple webkitdirectory directory>
    </section>

    <div class="status-tip" id="status-tip">点击导入按钮后选择“文件”或“文件夹”</div>
    <div class="component-toast component-toast--info gesture-toast" id="gesture-toast" role="status" aria-live="polite">
        <i id="gesture-toast-icon" class="component-toast__icon fluent-icon icon-ic_fluent_speaker_2_24_regular" aria-hidden="true"></i>
        <span id="gesture-toast-message" class="component-toast__message">音量 100%</span>
    </div>

    <aside class="playlist-drawer" id="playlist-drawer" aria-label="播放列表">
        <div class="playlist-head">
            <div class="playlist-head-top">
                <div class="playlist-title">播放列表</div>
                <button class="playlist-close-btn component-btn component-btn--immersive component-icon-btn" id="playlist-close-btn" type="button" title="关闭播放列表" aria-label="关闭播放列表">
                    <i class="fluent-icon icon-ic_fluent_dismiss_24_regular" aria-hidden="true"></i>
                </button>
            </div>
            <div class="playlist-head-divider" aria-hidden="true"></div>
            <div class="loop-row">
                <button class="loop-btn component-filter-chip active" data-loop="none" type="button">不循环</button>
                <button class="loop-btn component-filter-chip" data-loop="all" type="button">全部循环</button>
                <button class="loop-btn component-filter-chip" data-loop="one" type="button">单项循环</button>
                <button class="loop-btn component-filter-chip" data-loop="shuffle" type="button">随机播放</button>
            </div>
            <div class="component-search">
                <input id="playlist-search" class="playlist-search component-search__input" type="search" placeholder="搜索列表">
                <button id="playlist-search-clear" class="playlist-search-clear component-btn component-btn--immersive-tint component-icon-btn hidden" type="button" aria-label="清空搜索" title="清空搜索">
                    <i class="fluent-icon icon-ic_fluent_dismiss_24_regular" aria-hidden="true"></i>
                </button>
            </div>
        </div>
        <ul id="playlist-list" class="playlist-list"></ul>
    </aside>

    <script type="module" src="/js/media/video.js"></script>
</body>
</html>
